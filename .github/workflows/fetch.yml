name: Fetch data

on:
  schedule:
    - cron: '00 14 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    environment: lista20240301

    env:
      EPG_URL: ${{ vars.EPG_URL }}
      M3U_URL: ${{ vars.M3U_URL }}

    steps:
      - uses: actions/checkout@v2

      - name: Download Playlist file
        run: |
          set -e

          curl -sS -L --fail \
            -A "Mozilla/5.0" \
            -o playlist.m3u \
            "$M3U_URL"

          if ! grep -q "#EXTM3U" playlist.m3u; then
            echo "Invalid playlist file"
            head -n 20 playlist.m3u
            exit 1
          fi

      - name: Download EPG file
        if: ${{ env.EPG_URL != 'null' && env.EPG_URL != '' }}
        run: |
          set -e

          curl -sS -L --fail \
            -A "Mozilla/5.0" \
            -o epg.xml \
            "$EPG_URL"

          if ! grep -q "<tv" epg.xml; then
            echo "Invalid EPG file (likely blocked)"
            head -n 20 epg.xml
            exit 1
          fi

      - name: Commit changes if updated
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add playlist.m3u

          if [ "$EPG_URL" != "null" ] && [ -n "$EPG_URL" ] && [ -f epg.xml ]; then
            git add epg.xml
          fi

          git diff-index --quiet HEAD || git commit -m "actions-user: Fetch data workflow"
          git push
